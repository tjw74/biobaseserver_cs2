// Biobase "play" profile — standard combat-oriented dedicated defaults (casual/classic modes).
// Boot via biobase_startup.cfg (compose +exec biobase_startup); map loads re-exec via server.cfg.
// Cheat mode comes from compose CS2_CHEATS → joedwards32/cs2 (default 0 in play-focused stacks).

game_type 0
game_mode 0

// Bots fight like normal gameplay
bot_stop 0
bot_join_after_player 0

// Undo practice / dev-bundle behavior if it was previously applied from the same data volume.
sv_infinite_ammo 0
sv_regeneration_force_on 0
mp_ignore_round_win_conditions 0
weapon_accuracy_nospread 0
sv_showimpacts 0
sv_autobunnyhopping 0
sv_enablebunnyhopping 0

mp_limitteams 1
mp_autoteambalance 1
mp_buy_anywhere 0
mp_buy_allow_grenades 1

// Serviceable defaults (operators may override via server.cfg additions or RCON)
mp_roundtime 60
mp_roundtime_defuse 60
mp_timelimit 0
mp_freezetime 5
mp_halftime 1

// HL-format game-event logging for Loki ingest (bots/start sends these too; safe to duplicate)
log on
sv_logecho 1
mp_logdetail 3

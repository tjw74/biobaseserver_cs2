// Biobase development server — loaded via exec biobase_startup / biobase_dev (practice/KZ profile; set CS2_CHEATS=1 in Compose as needed).
// Re-run after changelevel if a plugin/game mode resets cvars: rcon exec biobase_dev
// Client-side cheat commands (noclip, god, ...) still require sv_cheats 1 here.

sv_cheats 1

// Bunny hop practice (if these stay false on DS, Valve may replicate them differently—see https://steamcommunity.com for CS2 movement updates.)
sv_autobunnyhopping 1
sv_enablebunnyhopping 1
sv_staminajumpcost 0
sv_staminalandcost 0

// Weapons / drills
sv_infinite_ammo 2
sv_regeneration_force_on 1

// Dev QoL (no team shuffle nag; buy helpers)
mp_limitteams 0
mp_autoteambalance 0
mp_buy_anywhere 1
mp_buy_allow_grenades 1

// Aim feedback (server; requires cheats)
sv_showimpacts 1

// Extended dev toggles (dedicated-tested where noted)
weapon_accuracy_nospread 1
mp_ignore_round_win_conditions 1
